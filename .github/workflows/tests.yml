name: tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: py${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        # colour-science and scikit-image are the independent implementations
        # tests/test_reference.py checks the conversions against
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pyflakes colour-science scikit-image

      - name: Lint
        run: pyflakes geopalette/ tests/ examples/

      - name: Test
        run: pytest -v
